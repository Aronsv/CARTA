<!DOCTYPE html>

<title>Cafetería 6:30</title>

<style>

body{
background:#000;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;

height:100vh;
margin:0;
}

.container{
text-align:center;

.logo{
width:240px;
margin-bottom:25px;
}

.address{

.menu-btn{

background:#6b4f3b;
color:white;
text-decoration:none;
padding:16px;
border-radius:12px;

font-size:18px;
font-weight:bold;

}

.menu-btn:hover{

.social{

.social img{

transition:0.2s;

.social img:hover{
