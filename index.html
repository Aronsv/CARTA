<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Cafetería 6:30</title>

<style>

body{
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
max-width:420px;
padding:30px;
}

.logo{

width:220px;
margin-bottom:10px;

animation:logoIntro 0.9s ease-out;

}
@keyframes logoIntro{

0%{
opacity:0;
transform:scale(0.65);
}

60%{
opacity:1;
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

.address{
display:block;
width:100%;
margin-top:10px;
margin-bottom:25px;
color:white;
text-decoration:none;
font-size:15px;
line-height:1.5;
}

.menu-btn{
display:block;
background:#7b5a40;
color:white;
text-decoration:none;
padding:16px;
border-radius:14px;
font-size:18px;
font-weight:bold;
margin-bottom:30px;
}

.icons{

display:flex;
justify-content:center;
gap:20px;

}

.icons img{

width:40px;
height:40px;

transition:0.25s ease;

border-radius:50%;

}

/* EFECTO HOVER */

.icons a:hover img{

transform:scale(1.12);

box-shadow:
0 0 8px rgba(212,175,55,0.6),
0 0 18px rgba(212,175,55,0.4);

}

.icons img:hover{

transform:scale(1.1);

}

.footer{

margin-top:25px;
font-size:12px;
color:#888;

}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<a class="address" href="https://maps.app.goo.gl/UfpQj8Vd4ywQBbYs9" target="_blank">
📍 Jr. Guillermo Urrelo 855<br>
Cajamarca, Perú
</a>

<a class="menu-btn" href="menu.pdf">
Ver Carta
</a>

<div class="icons">

<a href="https://maps.app.goo.gl/UfpQj8Vd4ywQBbYs9" target="_blank">
<img src="maps.png" alt="Maps">
</a>

<a href="https://www.instagram.com/cafeteria6.30cajamarca" target="_blank">
<img src="instagram.png" alt="Instagram">
</a>

<a href="https://wa.me/51997476508" target="_blank">
<img src="whatsapp.png" alt="WhatsApp">
</a>

<a href="https://www.facebook.com/cafeteria6.30" target="_blank">
<img src="facebook.png" alt="Facebook">
</a>

<a href="https://www.tiktok.com/@cafeteria630cajamarca" target="_blank">
<img src="tiktok.png" alt="TikTok">
</a>

</div>

<div class="footer">
© Cafetería 6:30
</div>

</div>

</body>

</html>
