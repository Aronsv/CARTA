<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cafetería 6:30</title>

<style>

body{
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
max-width:420px;
padding:30px;
}

.logo{
width:260px;
margin-bottom:25px;
filter: drop-shadow(0px 0px 10px rgba(255,255,255,0.15));
}

.address{
color:#cfcfcf;
font-size:15px;
margin-bottom:25px;
line-height:1.4;
}

.menu-btn{

display:block;
background:#6b4f3b;
color:white;
text-decoration:none;

padding:18px;
border-radius:14px;

font-size:18px;
font-weight:bold;

margin:25px 0;

box-shadow:0 6px 14px rgba(0,0,0,0.5);

transition:0.25s;

}

.menu-btn:hover{

background:#7a5a45;
transform:scale(1.03);

}

.social{

display:flex;
justify-content:center;
gap:22px;

margin-top:10px;

}

.social img{

width:48px;
height:48px;

transition:0.25s;

}

.social img:hover{

transform:scale(1.15);

}

.footer{

margin-top:30px;
font-size:12px;
color:#777;

}

</style>

</head>

<body>
<div class="container">

<img src="logo.png" class="logo">

<div class="address">
Jr. Guillermo Urrelo 855<br>
Cajamarca, Perú
</div>

<a class="menu-btn" href="menu.pdf" target="_blank">
Ver Carta
</a>

<div class="social">

<a href="https://maps.app.goo.gl/UfpQj8Vd4ywQBbYs9" target="_blank">
<img src="maps.png">
</a>

<a href="https://www.instagram.com/cafeteria6.30cajamarca" target="_blank">
<img src="instagram.png">
</a>

<a href="https://wa.me/51997476508" target="_blank">
<img src="whatsapp.png">
</a>

<a href="https://www.facebook.com/cafeteria6.30" target="_blank">
<img src="facebook.png">
</a>

</div>

<div class="footer">
© Cafetería 6:30
</div>

</div>

</body>
</html>
